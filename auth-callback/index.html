<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Super Flow — Signed in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      padding: 32px 28px;
      background: #1a1a1a;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      text-align: center;
    }
    .checkmark {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #6366f1;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    h1 { font-size: 1.35rem; margin: 0 0 8px; font-weight: 600; }
    p  { color: #a3a3a3; margin: 0 0 12px; font-size: 0.95rem; line-height: 1.45; }
    .hint { font-size: 0.82rem; color: #737373; margin: 16px 0 0; }
    .err  { color: #ef4444; font-size: 0.9rem; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkmark" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>You''re signed in to Super Flow</h1>
    <p id="status">Returning you to the app…</p>
    <p class="hint">If nothing happens, you can close this tab manually.</p>
    <p class="err" id="err"></p>
  </div>
  <script>
    (function () {
      var hash = location.hash || "";
      if (hash.indexOf("access_token=") === -1) {
        document.getElementById("status").textContent = "No session was returned by the sign-in provider.";
        if (hash.indexOf("error") !== -1) {
          var err = document.getElementById("err");
          err.style.display = "block";
          err.textContent = decodeURIComponent(hash.replace(/^#/, ""));
        }
        return;
      }
      location.href = "super-flow://auth/callback" + hash;
    })();
  </script>
</body>
</html>
